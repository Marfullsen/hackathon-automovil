<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Safe Drive: Santiago Centro 3D</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050505; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #hud {
            position: fixed; top: 20px; left: 20px; color: #00ffcc;
            background: rgba(0, 0, 0, 0.85); padding: 15px; border-radius: 10px;
            border: 2px solid #00ffcc; pointer-events: none; z-index: 100;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.2);
        }
        .label { font-size: 10px; color: #888; text-transform: uppercase; }
        .value { font-size: 22px; font-weight: bold; display: block; }
    </style>
</head>
<body>
    <div id="hud">
        <span class="label">Velocidad</span>
        <span class="value"><span id="spd">0</span> KM/H</span>
        <hr style="border: 0; border-top: 1px solid #333; margin: 10px 0;">
        <span class="label">Ubicación</span>
        <span id="distrito" style="color: #fff; font-weight: bold;">Cargando...</span>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        // --- 1. CONFIGURACIÓN DEL MUNDO ---
        const scene = new THREE.Scene();
        // Niebla que simula el smog/horizonte de la cuenca de Santiago
        scene.fog = new THREE.Fog(0x202025, 40, 180);
        scene.background = new THREE.Color(0x202025);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        // --- 2. POST-PROCESADO (Estética Nocturna/Atardecer) ---
        const composer = new EffectComposer(renderer);
        composer.addPass(new RenderPass(scene, camera));
        const bloom = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
        bloom.threshold = 0.75; // Solo brillan las luces potentes
        bloom.strength = 1.3;
        composer.addPass(bloom);

        // --- 3. LUCES (Simulando focos de calle) ---
        scene.add(new THREE.AmbientLight(0x404040, 0.5));
        const sun = new THREE.DirectionalLight(0xffaa88, 1); // Luz de atardecer
        sun.position.set(50, 50, 0);
        sun.castShadow = true;
        scene.add(sun);

        // --- 4. CONSTRUCCIÓN DEL MAPA SANTIAGO ---
        const roadMat = new THREE.MeshStandardMaterial({ color: 0x151515, roughness: 0.8 });
        const buildingMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
        const vallaMat = new THREE.MeshStandardMaterial({ color: 0xffcc00 }); // Amarillo Santiago

        // Suelo y Calle
        const ground = new THREE.Mesh(new THREE.PlaneGeometry(1000, 1000), new THREE.MeshStandardMaterial({color: 0x0a0a0a}));
        ground.rotation.x = -Math.PI/2; ground.receiveShadow = true;
        scene.add(ground);

        const road = new THREE.Mesh(new THREE.PlaneGeometry(24, 2000), roadMat);
        road.rotation.x = -Math.PI/2; road.position.y = 0.02; road.receiveShadow = true;
        scene.add(road);

        // Generar Distritos
        function createDistrict(zStart, zEnd, type) {
            for (let z = zStart; z > zEnd; z -= 15) {
                const side = Math.random() > 0.5 ? 1 : -1;
                const h = type === 'centro' ? 25 + Math.random() * 20 : 10 + Math.random() * 10;
                
                // Edificios
                const build = new THREE.Mesh(new THREE.BoxGeometry(10, h, 10), buildingMat);
                build.position.set(18 * side, h/2, z);
                build.castShadow = true;
                build.receiveShadow = true;
                scene.add(build);

                // Vallas peatonales (El "caos" de Gran Avenida)
                if (Math.random() > 0.7) {
                    const valla = new THREE.Mesh(new THREE.BoxGeometry(4, 1, 0.1), vallaMat);
                    valla.position.set(11 * side, 0.5, z + 5);
                    scene.add(valla);
                }
            }
        }

        // Tramo 1: Providencia (Edificios medios)
        createDistrict(500, 200, 'provi');
        // Tramo 2: Santa Lucía / Lastarria (Más denso)
        createDistrict(200, -100, 'centro');
        // Tramo 3: Alameda / La Moneda (Rascacielos)
        createDistrict(-100, -500, 'centro');

        // --- 5. VEHÍCULO (Ambulancia) ---
        const ambulance = new THREE.Group();
        const body = new THREE.Mesh(new THREE.BoxGeometry(2, 1.4, 4), new THREE.MeshStandardMaterial({color: 0xeeeeee}));
        body.position.y = 0.8; body.castShadow = true;
        
        const sirenMat = new THREE.MeshStandardMaterial({color: 0xff0000, emissive: 0xff0000, emissiveIntensity: 10});
        const siren = new THREE.Mesh(new THREE.BoxGeometry(1.5, 0.2, 0.4), sirenMat);
        siren.position.y = 1.6;
        
        ambulance.add(body, siren);
        ambulance.position.set(0, 0, 450);
        scene.add(ambulance);

        // --- 6. CONTROLES Y LÓGICA ---
        let speed = 0;
        const keys = {};
        window.onkeydown = (e) => keys[e.key.toLowerCase()] = true;
        window.onkeyup = (e) => keys[e.key.toLowerCase()] = false;

        function update() {
            // Movimiento
            if (keys['w'] || keys['arrowup']) speed = Math.min(speed + 0.005, 0.6);
            else speed = Math.max(speed - 0.01, 0);

            if (keys['a'] || keys['arrowleft']) ambulance.rotation.y += 0.03;
            if (keys['d'] || keys['arrowright']) ambulance.rotation.y -= 0.03;

            ambulance.translateZ(-speed);

            // Cámara Lerp (Seguimiento suave)
            const offset = new THREE.Vector3(0, 6, 15).applyMatrix4(ambulance.matrixWorld);
            camera.position.lerp(offset, 0.1);
            camera.lookAt(ambulance.position);

            // UI y Distritos
            document.getElementById('spd').innerText = Math.round(speed * 180);
            const z = ambulance.position.z;
            let distName = "Providencia";
            if (z < 200) distName = "Santa Lucía / Lastarria";
            if (z < -100) distName = "Alameda / La Moneda";
            document.getElementById('distrito').innerText = distName;

            // Efecto Sirena
            sirenMat.emissiveIntensity = 5 + Math.sin(Date.now() * 0.01) * 10;
        }

        function animate() {
            requestAnimationFrame(animate);
            update();
            composer.render();
        }
        animate();

        window.onresize = () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        };
    </script>
</body>
</html>
